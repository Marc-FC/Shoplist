<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="App para gestionar tus listas de compras con fotos, categorías e historial inteligente">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ShopList">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial'>🛒</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' text-anchor='middle' dominant-baseline='middle' fill='white' font-family='Arial'>🛒</text></svg>">
    <link rel="manifest" href="manifest.json">
    <title>ShopList - Tu lista de compras inteligente</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">🛒 ShopList</h1>
                <p class="subtitle">Tu lista de compras inteligente</p>
            </div>
        </header>

        <main class="main">
            <!-- Gestor de Listas -->
            <section class="lists-section">
                <div class="lists-container">
                    <div class="list-selector-group">
                        <label>Mi Lista Actual</label>
                        <select id="listSelect" class="list-selector">
                            <!-- Opciones generadas por JS -->
                        </select>
                    </div>
                    <button id="newListBtn" class="btn btn-primary">+ Nueva Lista</button>
                </div>

                <!-- Formulario Nueva Lista (oculto) -->
                <div id="newListForm" class="new-list-form" style="display: none;">
                    <div class="form-group">
                        <input
                            type="text"
                            id="newListInput"
                            placeholder="Ej: Compra Semanal, Cumpleaños..."
                            autocomplete="off"
                        >
                    </div>
                    <div class="form-actions">
                        <button id="createListBtn" class="btn btn-success">Crear Lista</button>
                        <button id="cancelListBtn" class="btn btn-secondary">Cancelar</button>
                    </div>
                </div>
            </section>

            <!-- Agregar Producto -->
            <section class="add-product-section">
                <div class="add-product-form">
                    <div class="input-group-with-search">
                        <input
                            type="text"
                            id="productInput"
                            placeholder="¿Qué necesitas comprar?"
                            autocomplete="off"
                        >
                        <button id="searchBtn" class="btn btn-search">🔍</button>
                        <ul id="suggestionsList" class="suggestions-list" style="display: none;">
                            <!-- Sugerencias generadas por JS -->
                        </ul>
                    </div>

                    <div class="form-row">
                        <select id="categorySelect" class="category-select">
                            <option value="🍎">🍎 Frutas</option>
                            <option value="🥛">🥛 Lácteos</option>
                            <option value="🧀">🧀 Quesos</option>
                            <option value="🥕">🥕 Verduras</option>
                            <option value="🥫">🥫 Conservas</option>
                            <option value="🍞">🍞 Panadería</option>
                            <option value="🌶️">🌶️ Salsas</option>
                            <option value="🧂">🧂 Condimentos</option>
                            <option value="🍖">🍖 Carnes</option>
                            <option value="🐟">🐟 Pescado</option>
                            <option value="🍬">🍬 Snacks</option>
                            <option value="🧃">🧃 Bebidas</option>
                            <option value="🍷">🍷 Vinos</option>
                            <option value="🧹">🧹 Limpieza</option>
                            <option value="💊">💊 Medicinas</option>
                            <option value="💪">💪 Suplementos</option>
                            <option value="💄">💄 Cosméticos</option>
                            <option value="🏠">🏠 Otros</option>
                        </select>
                        <button id="cameraBtn" class="btn btn-camera">📷</button>
                        <button id="addBtn" class="btn btn-add">Agregar</button>
                    </div>

                    <!-- Campos opcionales (notas y tienda) - ocultos por defecto -->
                    <div id="optionalFields" style="display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;">
                        <div class="form-group">
                            <textarea
                                id="notesInput"
                                class="notes-input"
                                placeholder="Notas (ej: Preferir marca X, comprar tamaño grande)"
                                rows="2"
                            ></textarea>
                        </div>

                        <div class="form-group">
                            <input
                                type="text"
                                id="storeInput"
                                class="store-input"
                                placeholder="Tienda (ej: Carrefour, Mercadona)"
                                autocomplete="off"
                            >
                        </div>
                    </div>
                </div>

                <!-- Input oculto para fotos -->
                <input
                    type="file"
                    id="photoInput"
                    accept="image/*"
                    capture="environment"
                    style="display: none;"
                >
            </section>

            <!-- Lista de Productos -->
            <section class="products-section">
                <div class="products-header">
                    <h2 id="listTitle">Mi Lista</h2>
                    <span id="productCount" class="product-count">0 productos</span>
                </div>

                <ul id="productList" class="product-list">
                    <!-- Productos generados por JS -->
                </ul>

                <div id="emptyMessage" class="empty-state">
                    <p class="empty-icon">🛍️</p>
                    <p class="empty-text">Tu lista está vacía</p>
                    <p class="empty-hint">¡Empieza a agregar productos!</p>
                </div>
            </section>

            <!-- Modal para info del producto escaneado -->
            <div id="productModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Información del Producto</h2>
                        <button class="modal-close" onclick="closeProductModal()">✕</button>
                    </div>
                    <div id="productInfo" class="modal-body">
                        <!-- Info del producto aquí -->
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeProductModal()">Cerrar</button>
                        <button id="addProductFromScanBtn" class="btn btn-add">Agregar a lista</button>
                    </div>
                </div>
            </div>

            <!-- Overlay del modal -->
            <div id="modalOverlay" class="modal-overlay" style="display: none;" onclick="closeProductModal()"></div>

            <!-- Modal para editar producto -->
            <div id="editModal" class="modal" style="display: none;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2>Editar Producto</h2>
                        <button class="modal-close" onclick="closeEditModal()">✕</button>
                    </div>
                    <div class="modal-body" style="padding: 20px;">
                        <div class="form-group">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Nombre del Producto</label>
                            <input
                                type="text"
                                id="editProductName"
                                placeholder="Nombre del producto"
                                autocomplete="off"
                                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;"
                            >
                        </div>

                        <div class="form-group">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Categoría</label>
                            <select id="editCategorySelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;">
                                <option value="🍎">🍎 Frutas</option>
                                <option value="🥛">🥛 Lácteos</option>
                                <option value="🧀">🧀 Quesos</option>
                                <option value="🥕">🥕 Verduras</option>
                                <option value="🥫">🥫 Conservas</option>
                                <option value="🍞">🍞 Panadería</option>
                                <option value="🌶️">🌶️ Salsas</option>
                                <option value="🧂">🧂 Condimentos</option>
                                <option value="🍖">🍖 Carnes</option>
                                <option value="🐟">🐟 Pescado</option>
                                <option value="🍬">🍬 Snacks</option>
                                <option value="🧃">🧃 Bebidas</option>
                                <option value="🍷">🍷 Vinos</option>
                                <option value="🧹">🧹 Limpieza</option>
                                <option value="💊">💊 Medicinas</option>
                                <option value="💪">💪 Suplementos</option>
                                <option value="💄">💄 Cosméticos</option>
                                <option value="🏠">🏠 Otros</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Tienda</label>
                            <input
                                type="text"
                                id="editStoreInput"
                                placeholder="Tienda (ej: Carrefour, Mercadona)"
                                autocomplete="off"
                                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box;"
                            >
                        </div>

                        <div class="form-group">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Notas</label>
                            <textarea
                                id="editNotesInput"
                                placeholder="Notas (ej: Preferir marca X, comprar tamaño grande)"
                                rows="2"
                                style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; font-family: inherit;"
                            ></textarea>
                        </div>

                        <div class="form-group">
                            <label style="display: block; font-weight: 600; margin-bottom: 6px;">Foto</label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <div id="editPhotoPreview" style="width: 60px; height: 60px; border: 2px dashed #ddd; border-radius: 6px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #f9f9f9; font-size: 12px; color: #999;">Sin foto</div>
                                <button type="button" id="editCameraBtn" class="btn btn-camera" style="flex-shrink: 0;">📷 Cambiar</button>
                                <input
                                    type="file"
                                    id="editPhotoInput"
                                    accept="image/*"
                                    capture="environment"
                                    style="display: none;"
                                >
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick="closeEditModal()">Cancelar</button>
                        <button id="saveEditBtn" class="btn btn-add">Guardar Cambios</button>
                    </div>
                </div>
            </div>

            <!-- Overlay del modal de edición -->
            <div id="editModalOverlay" class="modal-overlay" style="display: none;" onclick="closeEditModal()"></div>
        </main>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="script.js"></script>

    <!-- Registrar Service Worker para PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('✅ PWA registrada:', registration);
                })
                .catch(error => {
                    console.log('⚠️ Error registrando PWA:', error);
                });
        }

        // Detectar instalación
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            console.log('📱 App lista para instalar');
        });
    </script>
</body>
</html>
